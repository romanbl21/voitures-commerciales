<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Voitures Commerciales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#131313;--s2:#1a1a1a;--s3:#222;--s4:#2a2a2a;
  --b1:#1e1e1e;--b2:#2e2e2e;--b3:#404040;
  --t1:#f0f0f0;--t2:#909090;--t3:#4a4a4a;
  --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;
  --r:12px;--rsm:8px;--rlg:18px;--rxl:22px;
  --nav:62px;--top:54px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;color:var(--t1);overscroll-behavior:none}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.login-wrap{width:100%;max-width:380px}
.login-card{background:var(--s1);border:1px solid var(--b2);border-radius:24px;padding:36px 28px}
.login-logo{text-align:center;font-size:48px;margin-bottom:16px}
.login-card h1{font-size:22px;font-weight:800;text-align:center;letter-spacing:-.5px;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--t2);text-align:center;margin-bottom:28px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.lf input{width:100%;padding:14px;border:1px solid var(--b2);border-radius:var(--rsm);font-size:16px;background:var(--s2);color:var(--t1);font-family:inherit}
.lf input:focus{outline:none;border-color:var(--b3);background:var(--s3)}
.login-btn{width:100%;padding:15px;background:var(--t1);color:var(--bg);border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.login-err{font-size:13px;color:var(--red);text-align:center;margin-top:12px;min-height:18px}

/* SHELL */
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}

/* TOPBAR */
.topbar{height:var(--top);background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10}
.topbar-icon{font-size:20px}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(245,158,11,.2);color:#fcd34d}
.topbar-btn{width:38px;height:38px;border:1px solid var(--b2);background:var(--s2);border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);font-family:inherit;flex-shrink:0}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.page{display:none;padding:16px 14px}
.page.active{display:block}
/* Extra padding for bottom nav */
.page{padding-bottom:calc(var(--nav) + 16px)}

/* BOTTOM NAV */
.bnav{height:var(--nav);background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-shrink:0;z-index:10}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:inherit;font-size:10px;font-weight:600;padding-bottom:env(safe-area-inset-bottom,0)}
.bnav-item .bic{font-size:22px;line-height:1}
.bnav-item.on{color:var(--t1)}
.bnav-item.on .bic{transform:scale(1.05)}

/* SECTIONS LABELS */
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:2px}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 14px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.bl::before{background:var(--blue)}
.stat.gr::before{background:var(--green)}
.stat.am::before{background:var(--amber)}
.stat.rd::before{background:var(--red)}
.stat .lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat .val{font-size:26px;font-weight:800;letter-spacing:-1px}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
.sbar input{flex:1;background:transparent;border:none;font-size:15px;color:var(--t1);font-family:inherit;min-width:0}
.sbar input:focus{outline:none}
.sbar input::placeholder{color:var(--t3)}

/* POOL */
.pool-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rlg);overflow:hidden;margin-bottom:14px}
.card-head{padding:14px 15px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.card-head h3{font-size:14px;font-weight:700}
.card-head .sub{font-size:11px;color:var(--t3);margin-top:2px}
.card-body{padding:10px}

/* CARS */
.car-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rlg);overflow:hidden;margin-bottom:12px}
.car-top{padding:13px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b1)}
.car-bar{width:3px;height:40px;border-radius:3px;flex-shrink:0}
.car-ico{width:40px;height:40px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.car-name-row{flex:1;min-width:0}
.car-name-row h3{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.car-name-row .sub{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.op-tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.op-free{background:rgba(59,130,246,.2);color:#93c5fd}
.op-sfr{background:rgba(239,68,68,.2);color:#fca5a5}
.op-bouygues{background:rgba(245,158,11,.2);color:#fcd34d}
.car-cnt{font-size:11px;color:var(--t3)}
.car-btns{display:flex;gap:5px;flex-shrink:0}
.car-body{padding:13px 14px}

/* OBJ */
.obj-block{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rsm);padding:12px 13px;margin-bottom:12px}
.obj-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.obj-label{font-size:12px;color:var(--t2);font-weight:500}
.obj-inp{display:flex;align-items:center;gap:6px}
.obj-inp input{width:56px;font-size:15px;font-weight:700;padding:5px 8px;text-align:center;border:1px solid var(--b2);border-radius:6px;background:var(--s3);color:var(--t1);font-family:inherit}
.obj-inp input:disabled{opacity:.4}
.obj-unit{font-size:11px;color:var(--t3)}
.boxes{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.box{width:15px;height:15px;border-radius:3px}
.box.e{background:var(--s4)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;min-height:14px}
.chip-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent}
.chip-tag .x{cursor:pointer;opacity:.4;font-size:11px;padding:2px;min-width:20px;min-height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.chip-tag .x:active{opacity:1}

/* PICKER BUTTON */
.picker-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;font-size:13px;border:1.5px dashed var(--b2);border-radius:var(--rsm);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;font-weight:500;min-height:46px}
.picker-btn:active{background:var(--s2)}
.picker-btn:disabled{opacity:.35;cursor:not-allowed}

/* PICKER SHEET */
.picker-sheet{position:fixed;left:0;right:0;bottom:0;z-index:90;background:var(--s1);border-radius:22px 22px 0 0;border:1px solid var(--b2);border-bottom:none;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;height:80vh;padding-bottom:env(safe-area-inset-bottom,0)}
.picker-sheet.open{transform:translateY(0)}
.picker-handle{width:40px;height:4px;background:var(--b2);border-radius:4px;margin:12px auto 0}
.picker-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;flex-shrink:0}
.picker-head span{font-size:15px;font-weight:700}
.picker-head button{width:32px;height:32px;border:1px solid var(--b2);background:var(--s2);border-radius:var(--rsm);font-size:16px;color:var(--t2);display:flex;align-items:center;justify-content:center;font-family:inherit;cursor:pointer}
.picker-search{padding:0 12px 10px;flex-shrink:0}
.picker-search input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:11px 14px;font-size:15px;color:var(--t1);font-family:inherit}
.picker-search input:focus{outline:none;border-color:var(--b3)}
.picker-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.pdept{border-bottom:1px solid var(--b1)}
.pdept-hd{padding:11px 16px;font-size:12px;font-weight:700;color:var(--t2);background:var(--s2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;min-height:44px}
.pdept-hd:active{background:var(--s3)}
.pdept-cities{display:none;flex-direction:column}
.pdept-cities.open{display:flex}
.pcity{padding:12px 24px;font-size:14px;color:var(--t2);display:flex;align-items:center;gap:12px;min-height:48px;border-bottom:1px solid var(--b1);cursor:pointer}
.pcity:active{background:var(--s2)}
.pcity.sel{color:var(--green)}
.pchk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.pcity.sel .pchk{background:var(--green);border-color:var(--green);color:#000}
.picker-custom{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--b1);flex-shrink:0}
.picker-custom input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rsm);padding:12px;font-size:15px;color:var(--t1);font-family:inherit}
.picker-custom input:focus{outline:none;border-color:var(--b3)}
.picker-custom button{padding:0 16px;font-size:20px;border:1px solid var(--b2);background:var(--s2);border-radius:var(--rsm);cursor:pointer;color:var(--t1);font-family:inherit;min-height:48px}

/* DROP ZONES */
.drop-zone{min-height:64px;border:1.5px dashed var(--b2);border-radius:var(--rsm);padding:6px;display:flex;flex-direction:column;gap:5px;transition:all .2s}
.drop-zone.ov{background:rgba(34,197,94,.08);border-color:var(--green)}
.hint{font-size:12px;color:var(--t3);text-align:center;padding:18px 0;pointer-events:none;font-weight:500}

/* PILL */
.pill{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--s2);border-radius:var(--rsm);border:1px solid var(--b1);user-select:none;min-height:52px;cursor:grab;position:relative}
.pill:active{background:var(--s3)}
.pill.dragging{opacity:.2}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pi{flex:1;min-width:0}
.pname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prole{font-size:11px;margin-top:2px;font-weight:500}
.r0{color:var(--t3)}.r1{color:#fcd34d}.r2{color:#86efac}
.dh{font-size:16px;color:var(--b3);flex-shrink:0;padding:4px}

/* TOUCH DRAG GHOST */
.drag-ghost{position:fixed;pointer-events:none;z-index:999;opacity:.85;border-radius:var(--rsm);box-shadow:0 8px 24px rgba(0,0,0,.5);transform:scale(1.04);transition:none;background:var(--s3);border:1px solid var(--b3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;border:1px solid var(--b2);min-height:46px}
.btn-g{background:var(--s2);color:var(--t2)}
.btn-g:active{background:var(--s3)}
.btn-s{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.btn-s:active{opacity:.85}
.btn-d{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.3)}
.btn-sm{padding:8px 13px;font-size:12px;min-height:38px}
.icbtn{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--s2);color:var(--t2);border:1px solid var(--b1);border-radius:var(--rsm);cursor:pointer;font-family:inherit}
.icbtn:active{background:var(--s3);color:var(--t1)}
.add-car-btn{width:100%;padding:14px;border:1.5px dashed var(--b2);background:transparent;border-radius:var(--rlg);cursor:pointer;font-size:13px;color:var(--t3);font-weight:600;font-family:inherit;min-height:52px;margin-top:4px}
.add-car-btn:active{background:var(--s1)}
.ro-badge{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(255,255,255,.04);color:var(--t3);border:1px solid var(--b1)}

/* HISTORY */
.hist-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fb{padding:9px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;font-family:inherit;min-height:40px}
.fb.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.hist-day{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:12px 2px 6px;border-bottom:1px solid var(--b1);margin-bottom:5px}
.hrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r);background:var(--s1);border:1px solid var(--b1);margin-bottom:5px}
.hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hbody{flex:1;min-width:0}
.htxt{font-size:13px;font-weight:500}
.hsub{font-size:11px;color:var(--t3);margin-top:2px}
.htime{font-size:11px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.hbadge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;margin-left:6px}
.hbadge.a{background:rgba(34,197,94,.15);color:#86efac}
.hbadge.r{background:rgba(239,68,68,.15);color:#fca5a5}
.empty-st{text-align:center;padding:50px 20px;color:var(--t3);font-size:13px}

/* MODAL SHEET */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:22px 22px 0 0;width:100%;padding:0 18px calc(env(safe-area-inset-bottom,0) + 24px);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-hd{width:40px;height:4px;background:var(--b2);border-radius:4px;margin:12px auto 16px}
.modal h2{font-size:18px;font-weight:800;margin-bottom:18px;letter-spacing:-.4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;color:var(--t3);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.field input{width:100%;padding:13px;border:1px solid var(--b2);border-radius:var(--rsm);font-size:16px;background:var(--s2);color:var(--t1);font-family:inherit}
.field input:focus{outline:none;border-color:var(--b3)}
.field input::placeholder{color:var(--t3)}
.cr{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.ch{padding:9px 15px;border-radius:20px;font-size:13px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;font-weight:500;font-family:inherit;min-height:42px}
.ch.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.macts{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.macts .btn{width:100%}
.macts-row{display:flex;gap:8px}
.macts-row .btn{flex:1}
.cpick{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.cdot.on{border-color:var(--t1)}
.prof-hd{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--b1)}
.prof-av{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:700;flex-shrink:0}
.prof-info h3{font-size:16px;font-weight:700}
.prof-info p{font-size:12px;color:var(--t3);margin-top:3px}
.psgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ps{background:var(--s2);border-radius:var(--rsm);padding:10px 12px;border:1px solid var(--b1)}
.ps .pl{font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:700;text-transform:uppercase}
.ps .pv{font-size:13px;font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%);background:var(--s3);color:var(--t1);padding:12px 20px;border-radius:24px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:600;white-space:nowrap;border:1px solid var(--b3);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1}

/* ACCESS LEVEL INDICATOR */
.access-info{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--t2)}
.access-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🚗</div>
      <h1>Voitures commerciales</h1>
      <p>Occitanie · Montpellier</p>
      <div class="lf"><label>Email</label><input type="email" id="lEmail" placeholder="votre@email.com" autocomplete="email"/></div>
      <div class="lf"><label>Mot de passe</label><input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="login-btn" onclick="doLogin()">Se connecter</button>
      <div class="login-err" id="lErr"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <span class="topbar-icon">🚗</span>
    <span class="topbar-title" id="topTitle">Tableau de bord</span>
    <span class="topbar-badge" id="topBadge" style="display:none"></span>
    <button class="topbar-btn" id="topActBtn" style="display:none" onclick="topAction()"></button>
    <button class="topbar-btn" onclick="doLogout()">↩</button>
  </div>

  <div class="content">
    <!-- BOARD -->
    <div class="page active" id="page-board">
      <div class="sbar">
        <span style="font-size:17px;flex-shrink:0">🔍</span>
        <input type="text" id="searchInput" placeholder="Rechercher…" oninput="onSearch()"/>
      </div>
      <div class="stats" id="statsGrid"></div>
      <div id="boardContent"></div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="page-history">
      <div class="sbar">
        <span style="font-size:17px;flex-shrink:0">🔍</span>
        <input type="text" id="histSearch" placeholder="Ville, secteur, voiture…" oninput="renderHist()"/>
        <span id="histCount" style="font-size:11px;color:var(--t3);white-space:nowrap"></span>
      </div>
      <div class="hist-filters">
        <button class="fb on" id="filt-all" onclick="setFilt('all')">Tout</button>
        <button class="fb" id="filt-ajout" onclick="setFilt('ajout')">🟢 Ajouts</button>
        <button class="fb" id="filt-retrait" onclick="setFilt('retrait')">🔴 Retraits</button>
      </div>
      <div id="histList"></div>
    </div>
  </div>

  <nav class="bnav" id="bnavEl">
    <button class="bnav-item on" id="bnav-board" onclick="goPage('board')"><span class="bic">📋</span>Tableau</button>

// ── ACCESS CONTROL ──
// canEdit: can edit a specific car (add sectors, change objectif, drag to this car)
function canEdit(carId){
  if(accessLevel>=2)return true; // animateur or admin
  if(accessLevel===1&&currentUser&&currentUser.car_id===carId)return true; // chef editing own car
  return false;
}

// ── AUTH ──
async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  const err=document.getElementById('lErr');
  err.textContent='Connexion…';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Email ou mot de passe incorrect';return;}
  err.textContent='';
  await setupUser(data.user);
}
async function setupUser(user){
  isAdmin=user.email===ADMIN_EMAIL;
  // Find member record by email
  const {data}=await sb.from('members').select('*').eq('email',user.email).single();
  currentUser=data||null;
  if(isAdmin){
    accessLevel=3;
  } else if(currentUser){
    accessLevel=roleIdx(currentUser);
  } else {
    accessLevel=0;
  }
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').classList.add('on');
  // Setup UI based on access
  const badge=isAdmin?'Admin':(currentUser?currentUser.role:'Lecture');
  document.getElementById('topBadge').textContent=badge;
  document.getElementById('topBadge').style.display='inline-flex';
  // Show/hide nav items
  document.getElementById('bnav-history').style.display=canSeeHistory()?'flex':'none';
  document.getElementById('bnav-add').style.display=canAddPeople()?'flex':'none';
  document.getElementById('bnav-car').style.display=canAddCar()?'flex':'none';
  await loadAll();
}
async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;isAdmin=false;accessLevel=0;
  document.getElementById('app').classList.remove('on');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('lPass').value='';
}
sb.auth.getSession().then(({data:{session}})=>{if(session)setupUser(session.user)});

function goPage(page){
  if(page==='history'&&!canSeeHistory())return;
  currentPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('on'));
  const bb=document.getElementById('bnav-'+page);if(bb)bb.classList.add('on');
  const titles={board:'Tableau de bord',history:'Historique secteurs'};
  document.getElementById('topTitle').textContent=titles[page]||page;
  if(page==='history')renderHist();
}

// ── DATA ──
async function loadAll(){
  const [cR,mR,sR,hR]=await Promise.all([
    sb.from('cars').select('*').order('created_at'),
    sb.from('members').select('*').order('created_at'),
    sb.from('sectors').select('*').order('created_at'),
    sb.from('sector_history').select('*').order('created_at',{ascending:false}).limit(500)
  ]);
  cars=cR.data||[];members=mR.data||[];sectors=sR.data||[];history=hR.data||[];
  render();
}
const getSecs=cid=>sectors.filter(s=>s.car_id===cid);
const getMems=cid=>members.filter(m=>m.car_id===cid);

function mq(text){
  const q=(document.getElementById('searchInput')||{value:''}).value.toLowerCase().trim();

}

    <div class="stat bl"><div class="lbl">Voitures</div><div class="val">${cars.length}</div></div>
    <div class="stat gr"><div class="lbl">Commerciaux</div><div class="val">${members.length}</div></div>
    <div class="stat am"><div class="lbl">Affectés</div><div class="val">${placed}</div></div>
    <div class="stat rd"><div class="lbl">Objectif</div><div class="val">${tBox} box</div></div>`;
}

function renderBoard(){
  const el=document.getElementById('boardContent');
  let html='';

  // Pool (only for animateur+ or chef)
  if(accessLevel>=1){
    const pool=members.filter(m=>!m.car_id);
    const vis=pool.filter(m=>mq(m.name));
    html+=`<div class="pool-card">
      <div class="card-head"><div><h3>Pool</h3><div class="sub">Sans voiture assignée</div></div></div>
      <div class="card-body">
        <div class="drop-zone" id="pool-zone" data-dropid="pool">
          ${pool.map(m=>pillHtml(m)).join('')}
          ${vis.length===0?`<div class="hint">${pool.length===0?'Tous affectés ✓':'Aucun résultat'}</div>`:''}
        </div>
      </div>
    </div>`;
  }

  // Cars
  const q=(document.getElementById('searchInput')||{value:''}).value.toLowerCase().trim();
  // For commercial: only show their car
  let visibleCars=cars;
  if(accessLevel===0&&currentUser){
    visibleCars=cars.filter(c=>c.id===currentUser.car_id);
  }

  html+=visibleCars.map(car=>{
    const ms=getMems(car.id),ss=getSecs(car.id);
    const col=OPCOL[car.operator]||'#888';
    const cm=!q||(car.name.toLowerCase().includes(q)||ss.some(s=>s.name.toLowerCase().includes(q))||ms.some(m=>m.name.toLowerCase().includes(q)));
    const canE=canEdit(car.id);
    const isMyCar=currentUser&&currentUser.car_id===car.id;

    const adminBtns=accessLevel>=2?`<button class="icbtn" onclick="openEditCar('${car.id}')">✎</button><button class="icbtn" onclick="deleteCar('${car.id}')">🗑</button>`:
      (accessLevel===0?`<span class="ro-badge">👁</span>`:'');

    return `<div class="car-card" style="display:${cm?'block':'none'}${isMyCar?' border-color:#3b82f6;':''}" id="cc-${car.id}">
      <div class="car-top">
        <div class="car-bar" style="background:${col}"></div>
        <div class="car-ico" style="background:${OPBG[car.operator]||'#222'}">${car.emoji}</div>
        <div class="car-name-row">
          <h3>${car.name}${isMyCar&&accessLevel>0?'<span style="font-size:10px;color:var(--blue);margin-left:6px">● Ma voiture</span>':''}</h3>
          <div class="sub">${opTag(car.operator)}<span class="car-cnt">${ms.length} pers.</span></div>
        </div>
        <div class="car-btns">${adminBtns}</div>
      </div>
      <div class="car-body">
        <div class="obj-block">
          <div class="obj-row">
            <span class="obj-label">Objectif journalier</span>
            <div class="obj-inp">
              <input type="number" min="0" max="99" value="${car.objectif||0}" ${canE?`onchange="setObj('${car.id}',this.value)"`:' disabled'}>
              <span class="obj-unit">box</span>
            </div>
          </div>
          ${boxesHtml(car)}
        </div>
        <div>
          <div class="slbl" id="slbl-${car.id}">Secteurs & villes (${ss.length})</div>
          <div class="chips" id="chips-${car.id}">${chipsHtml(ss,car)}</div>
          ${canE?`<button class="picker-btn" onclick="openPicker('${car.id}')">＋ Ajouter ville / secteur</button>`:''}
        </div>
        <div class="slbl" style="margin-top:12px">Équipe · ${ms.length} pers.</div>
        <div class="drop-zone" id="zone-${car.id}" data-dropid="${car.id}">
          ${ms.map(m=>pillHtml(m)).join('')}

        </div>
      </div>
    </div>`;
  }).join('');

    html+=`<button class="add-car-btn" onclick="openAddCar()">+ Nouvelle voiture</button>`;
  }

  el.innerHTML=html;
  initDragDrop();
}

function boxesHtml(car){
  const obj=car.objectif||0;if(!obj)return '';
  const n=getMems(car.id).length,col=OPCOL[car.operator]||'#888';
  let h='<div class="boxes">';
  for(let i=0;i<obj;i++)h+=`<div class="box${i<n?'':' e'}" style="${i<n?'background:'+col:''}"></div>`;
  return h+'</div>';
}

function chipsHtml(ss,car){
  if(!ss.length)return '<span style="font-size:11px;color:var(--t3)">Aucun secteur</span>';
  const canE=canEdit(car.id);
  return ss.map(s=>{
    const d=fdept(s.name);const dco=d?dc(d):{bg:'rgba(255,255,255,.06)',tx:'#888'};
    const sn=s.name.replace(/\\/g,'\\\\').replace(/'/g,'\\x27');
    const cn=car.name.replace(/\\/g,'\\\\').replace(/'/g,'\\x27');
    return `<span class="chip-tag" style="background:${dco.bg};color:${dco.tx}">${s.name}${canE?`<span class="x" onclick="rmSec('${s.id}','${car.id}','${sn}','${cn}')">✕</span>`:''}
    </span>`;
  }).join('');
}

function pillHtml(m){
  const ri=roleIdx(m);
  const show=mq(m.name+' '+ROLES[ri]);
  const canD=canDrag();
  return `<div class="pill${canD?'':' no-drag'}" id="mp-${m.id}" ${canD?`draggable="true" ondragstart="ds(event,'${m.id}')" ondragend="de(event)"`:''}
    style="display:${show?'flex':'none'}">
    ${canD?`<span class="dh" style="touch-action:none">⠿</span>`:''}
    <div class="av" style="${avS(m)}">${ini(m.name)}</div>
    <div class="pi">
      <div class="pname">${m.name}</div>
      <div class="prole ${rc(ri)}">${ROLES[ri]}</div>
    </div>
    <button class="icbtn" onclick="openProfile('${m.id}');event.stopPropagation()">👤</button>
  </div>`;
}

function render(){renderStats();renderBoard();if(currentPage==='history')renderHist();}

// ── DRAG & DROP (mouse) ──
function ds(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('mp-'+id);if(el)el.classList.add('dragging');},0)}
function de(){const el=document.getElementById('mp-'+dragId);if(el)el.classList.remove('dragging');document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));dragId=null}
function dov(e){e.preventDefault();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));e.currentTarget.classList.add('ov')}
async function ddr(e,target){
  e.preventDefault();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));
  await executeDrop(dragId,target);
}

// ── TOUCH DRAG & DROP ──
function initDragDrop(){
  // Mouse drop zones
  document.querySelectorAll('.drop-zone').forEach(zone=>{
    zone.ondragover=e=>{e.preventDefault();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));zone.classList.add('ov')};
    zone.ondrop=async e=>{e.preventDefault();document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));await executeDrop(dragId,zone.dataset.dropid)};
  });

  // Touch drag for each pill
  document.querySelectorAll('.pill:not(.no-drag)').forEach(pill=>{
    pill.addEventListener('touchstart',onTouchStart,{passive:false});
    pill.addEventListener('touchmove',onTouchMove,{passive:false});
    pill.addEventListener('touchend',onTouchEnd,{passive:false});
  });
}

let touchStartX=0,touchStartY=0,touchMoved=false;

function onTouchStart(e){
  if(!canDrag())return;
  const pill=e.currentTarget;
  const mid=pill.id.replace('mp-','');
  touchDragId=mid;
  touchMoved=false;
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;
}

function onTouchMove(e){
  if(!touchDragId)return;
  e.preventDefault();
  const t=e.touches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  if(!touchMoved&&Math.sqrt(dx*dx+dy*dy)>8){
    touchMoved=true;
    // Create ghost
    const src=document.getElementById('mp-'+touchDragId);
    if(!src)return;
    src.classList.add('dragging');
    if(!touchGhost){
      touchGhost=src.cloneNode(true);
      touchGhost.className='drag-ghost';
      touchGhost.style.width=src.offsetWidth+'px';
      touchGhost.style.pointerEvents='none';
      document.body.appendChild(touchGhost);
    }
  }
  if(touchGhost){
    touchGhost.style.left=(t.clientX-touchGhost.offsetWidth/2)+'px';
    touchGhost.style.top=(t.clientY-40)+'px';
    // Highlight drop zone under finger
    document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));
    const els=document.elementsFromPoint(t.clientX,t.clientY);
    const zone=els.find(el=>el.classList.contains('drop-zone'));
    if(zone)zone.classList.add('ov');
  }
}

async function onTouchEnd(e){
  if(!touchDragId)return;
  const t=e.changedTouches[0];
  // Cleanup ghost
  if(touchGhost){touchGhost.remove();touchGhost=null;}
  const src=document.getElementById('mp-'+touchDragId);
  if(src)src.classList.remove('dragging');
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('ov'));
  if(!touchMoved){touchDragId=null;return;}
  // Find drop target
  const els=document.elementsFromPoint(t.clientX,t.clientY);
  const zone=els.find(el=>el.classList.contains('drop-zone'));
  if(zone&&zone.dataset.dropid){
    await executeDrop(touchDragId,zone.dataset.dropid);
  }
  touchDragId=null;
}

async function executeDrop(memberId,target){
  if(!memberId||!target)return;
  if(!canDrag())return;
  const m=members.find(x=>x.id===memberId);if(!m)return;
  if((target==='pool'&&!m.car_id)||(m.car_id===target))return;
  // Chef can only drop TO their car or FROM their car
  if(accessLevel===1&&currentUser){
    const myCar=currentUser.car_id;
    const fromMyCar=m.car_id===myCar;
    const toMyCar=target===myCar;
    const toPool=target==='pool';
    if(!fromMyCar&&!toMyCar&&!toPool)return;
  }
  m.car_id=target==='pool'?null:target;
  render();
  await sb.from('members').update({car_id:m.car_id}).eq('id',memberId);
  toast('Commercial déplacé ✓');
}

// ── PICKER ──
function openPicker(carId){

  const secSet=new Set(ss.map(s=>s.name));
  const list=document.getElementById('pickerList');
  list.innerHTML=Object.entries(GEO).map(([dept,cities])=>{
    const dk=eid(dept);
    return `<div class="pdept" id="pd-${dk}">
      <div class="pdept-hd" onclick="toggleDept('${dk}')"><span>${dept}</span><span id="dc-${dk}">›</span></div>
      <div class="pdept-cities" id="pc-${dk}">
        ${cities.map(city=>`<div class="pcity${secSet.has(city)?' sel':''}" id="pci-${eid(city)}" onclick="toggleCity(this)">
          <div class="pchk">${secSet.has(city)?'✓':''}</div><span>${city}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('pickerQ').value='';
  document.getElementById('pickerCustom').value='';
  document.getElementById('pickerSheet').classList.add('open');
  document.getElementById('pickerOv').style.display='block';
}
function closePicker(){
  document.getElementById('pickerSheet').classList.remove('open');
  document.getElementById('pickerOv').style.display='none';
  activePicker=null;
}
function toggleDept(dk){
  const el=document.getElementById('pc-'+dk);
  const chev=document.getElementById('dc-'+dk);
  if(!el)return;
  const o=el.classList.toggle('open');
  if(chev)chev.textContent=o?'↓':'›';
}
function filterPicker(){
  const q=document.getElementById('pickerQ').value.toLowerCase().trim();
  Object.entries(GEO).forEach(([dept,cities])=>{
    const dk=eid(dept);let any=false;
    cities.forEach(city=>{
      const el=document.getElementById('pci-'+eid(city));
      if(el){const s=!q||city.toLowerCase().includes(q);el.style.display=s?'flex':'none';if(s)any=true;}
    });
    const de=document.getElementById('pd-'+dk);
    if(de)de.style.display=(any||!q)?'block':'none';
    if(q&&any){const pe=document.getElementById('pc-'+dk);if(pe)pe.classList.add('open');}
  });
}
async function toggleCity(el){
  if(!activePicker)return;
  const city=el.querySelector('span').textContent;
  const car=cars.find(c=>c.id===activePicker);if(!car)return;
  const existing=sectors.find(s=>s.car_id===activePicker&&s.name===city);
  if(existing){
    sectors=sectors.filter(s=>s.id!==existing.id);
    el.classList.remove('sel');const chk=el.querySelector('.pchk');if(chk)chk.textContent='';
    updateCarUI(activePicker);
    await sb.from('sectors').delete().eq('id',existing.id);
    await logSector('retrait',city,car.name);
    toast(`${city} retiré`);
  } else {
    const {data,error}=await sb.from('sectors').insert({car_id:activePicker,name:city}).select().single();
    if(error){toast('Erreur');return;}
    sectors.push(data);
    el.classList.add('sel');const chk=el.querySelector('.pchk');if(chk)chk.textContent='✓';
    updateCarUI(activePicker);
    await logSector('ajout',city,car.name);
    toast(`${city} ajouté ✓`);
  }
}
async function addCustomCity(){
  if(!activePicker)return;
  const inp=document.getElementById('pickerCustom');
  const city=inp.value.trim();if(!city)return;inp.value='';
  const car=cars.find(c=>c.id===activePicker);if(!car)return;
  if(sectors.find(s=>s.car_id===activePicker&&s.name===city)){toast('Déjà ajouté');return;}
  const {data,error}=await sb.from('sectors').insert({car_id:activePicker,name:city}).select().single();
  if(error){toast('Erreur');return;}
  sectors.push(data);
  updateCarUI(activePicker);
  await logSector('ajout',city,car.name);
  toast(`${city} ajouté ✓`);
}
async function logSector(action,sector_name,car_name){
  const hRow={action,sector_name,car_name};
  await sb.from('sector_history').insert(hRow);
  history.unshift({...hRow,created_at:new Date().toISOString()});
}
function updateCarUI(carId){
  const ss=getSecs(carId);
  const car=cars.find(c=>c.id===carId);if(!car)return;
  const ce=document.getElementById('chips-'+carId);if(ce)ce.innerHTML=chipsHtml(ss,car);
  const se=document.getElementById('slbl-'+carId);if(se)se.textContent=`Secteurs & villes (${ss.length})`;
  renderStats();
  if(currentPage==='history')renderHist();
}
async function rmSec(sid,carId,sname,cname){
  if(!canEdit(carId))return;
  sectors=sectors.filter(s=>s.id!==sid);
  updateCarUI(carId);
  const ckey=eid(sname);
  const el=document.getElementById('pci-'+ckey);
  if(el){el.classList.remove('sel');const chk=el.querySelector('.pchk');if(chk)chk.textContent='';}
  await sb.from('sectors').delete().eq('id',sid);
  await logSector('retrait',sname,cname);
  toast(`${sname} retiré`);
}
async function deleteCar(id){
  if(!canAddCar())return;
  const car=cars.find(c=>c.id===id);if(!car)return;
  if(!confirm(`Supprimer "${car.name}" ?`))return;
  members.forEach(m=>{if(m.car_id===id)m.car_id=null});
  sectors=sectors.filter(s=>s.car_id!==id);
  cars=cars.filter(c=>c.id!==id);render();
  await sb.from('cars').delete().eq('id',id);toast('Voiture supprimée');

// ── HISTORY ──
function setFilt(f){histFilt=f;['all','ajout','retrait'].forEach(x=>document.getElementById('filt-'+x).classList.toggle('on',x===f));renderHist();}
function renderHist(){
  const el=document.getElementById('histList');if(!el)return;
  const q=(document.getElementById('histSearch')||{value:''}).value.toLowerCase().trim();
  let rows=history;
  if(histFilt!=='all')rows=rows.filter(h=>h.action===histFilt);
  if(q)rows=rows.filter(h=>(h.sector_name+' '+h.car_name).toLowerCase().includes(q));
  document.getElementById('histCount').textContent=rows.length?`${rows.length} entrée${rows.length>1?'s':''}`:' Aucun résultat';
  if(!rows.length){el.innerHTML=`<div class="empty-st">🕐 Aucune modification</div>`;return;}
  const grouped={};
  rows.forEach(h=>{
    const d=new Date(h.created_at);
    const key=d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    if(!grouped[key])grouped[key]=[];grouped[key].push(h);
  });
  el.innerHTML=Object.entries(grouped).map(([day,items])=>`
    <div class="hist-day">${day}</div>
    ${items.map(h=>{
      const isA=h.action==='ajout';
      const time=new Date(h.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      const d=fdept(h.sector_name);const dco=d?dc(d):null;
      return `<div class="hrow">
        <div class="hdot" style="background:${isA?'#22c55e':'#ef4444'}"></div>
        <div class="hbody">
          <div class="htxt"><strong>${h.sector_name}</strong><span class="hbadge ${isA?'a':'r'}">${isA?'+ Ajout':'− Retrait'}</span>${dco?`<span style="display:inline-flex;padding:1px 6px;border-radius:10px;font-size:10px;margin-left:4px;background:${dco.bg};color:${dco.tx}">${d.split('(')[0].trim()}</span>`:''}</div>
          <div class="hsub">${h.car_name}</div>
        </div>
        <div class="htime">${time}</div>
      </div>`;
    }).join('')}`).join('');
}

function closeModal(){document.getElementById('modalBg').classList.remove('open')}

function selOp(el,v){document.querySelectorAll('#modalBox .ch[data-t="o"]').forEach(c=>c.classList.remove('on'));el.classList.add('on');mOp=v;}

    <div class="field"><label>Téléphone</label><input id="pPhone" value="${m.phone||''}"/></div>
    <div class="field"><label>Note</label><input id="pNote" value="${m.note||''}"/></div>
    <div class="field"><label>Couleur</label><div class="cpick">${AV.map((ac,i)=>`<div class="cdot${i===selColor?' on':''}" style="background:${ac.bg}" onclick="pickColor(this,${i})"></div>`).join('')}</div></div>

      <div class="macts-row"><button class="btn btn-g" onclick="closeModal()">Fermer</button><button class="btn btn-s" onclick="saveProfile('${id}')">Enregistrer</button></div>

async function saveProfile(id){
  const m=members.find(x=>x.id===id);if(!m)return;
  m.name=(document.getElementById('pName').value||m.name).trim();

  await sb.from('members').delete().eq('id',id);toast('Commercial supprimé');
